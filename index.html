  <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - RideAlong</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/signup.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-logo">⚡ RideAlong</a>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-card card">
      <div class="auth-logo">⚡</div>
      <h2 class="auth-title">Create Account</h2>
      <p class="auth-subtitle">Join RideAlong and start your EV journey</p>

      <form id="signup-form" onsubmit="submitSignup(event)">
        <div class="form-group">
          <label for="s-name">Full Name <span class="req">*</span></label>
          <input type="text" id="s-name" class="form-input" placeholder="Your full name" autocomplete="name">
          <span class="error-text"></span>
        </div>
        <div class="form-group">
          <label for="s-email">Email Address <span class="req">*</span></label>
          <input type="email" id="s-email" class="form-input" placeholder="you@example.com" autocomplete="email">
          <span class="error-text"></span>
        </div>
        <div class="form-group">
          <label for="s-phone">Phone Number <span class="req">*</span></label>
          <input type="tel" id="s-phone" class="form-input" placeholder="10-digit mobile number" autocomplete="tel">
          <span class="error-text"></span>
        </div>
        <div class="form-group">
          <label for="s-password">Password <span class="req">*</span></label>
          <div class="password-wrap">
            <input type="password" id="s-password" class="form-input" placeholder="Min 8 chars, uppercase, number, special">
            <button type="button" class="pwd-toggle" onclick="togglePwd('s-password', this)">👁️</button>
          </div>
          <span class="error-text"></span>
          <div class="pwd-strength" id="pwd-strength"></div>
        </div>
        <div class="form-group">
          <label for="s-confirm">Confirm Password <span class="req">*</span></label>
          <div class="password-wrap">
            <input type="password" id="s-confirm" class="form-input" placeholder="Re-enter your password">
            <button type="button" class="pwd-toggle" onclick="togglePwd('s-confirm', this)">👁️</button>
          </div>
          <span class="error-text"></span>
        </div>
        <div class="form-group">
          <label for="s-role">Account Type</label>
          <select id="s-role" class="form-input">
            <option value="user">User (Regular)</option>
            <option value="sales">Sales Representative</option>
            <option value="support">Support Staff</option>
          </select>
        </div>
        <div class="form-group">
          <label class="checkbox-label terms-check">
            <input type="checkbox" id="s-terms">
            <span>I agree to the <a href="#" onclick="return false">Terms of Service</a> and <a href="#" onclick="return false">Privacy Policy</a></span>
          </label>
          <span class="error-text" id="terms-err"></span>
        </div>
        <button type="submit" class="btn btn-primary btn-full btn-lg">Create Account</button>
      </form>

      <p class="auth-switch">Already have an account? <a href="login.html">Login</a></p>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/common.js"></script>
  <script src="js/signup.js"></script>
</body>
</html>
